<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body{% if page.nav_tool %} class="tool-doc-page"{% endif %}>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">buchwandler</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ '/tools/' | relative_url }}">Tools</a>
        <a href="{{ '/tools/epub2text/' | relative_url }}">epub2text</a>
        <a href="{{ '/tools/text2epub/' | relative_url }}">text2epub</a>
        <a href="{{ '/tools/phrasplit/' | relative_url }}">phrasplit</a>
        <a href="{{ '/tools/booktx/' | relative_url }}">booktx</a>
        <a href="{{ '/impressum/' | relative_url }}">Impressum</a>
        <a href="{{ '/datenschutz/' | relative_url }}">Datenschutz</a>
      </nav>
    </header>
    <main class="page">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p>Book processing tools for ebook workflows.</p>
    </footer>
  </body>
</html>
