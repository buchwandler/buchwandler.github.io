[site]
root = "."
base_url = "https://buchwandler.de"
tools_dir = "tools"
nav_data_dir = "_data/tool_nav"
layout = "tool-doc"
title = "buchwandler Tool Docs"
protect_liquid = true

[site.versioning]
enabled = true
default = "release"

[[site.versioning.variants]]
name = "release"
label = "Latest release"
source = "release"
url_segment = ""

[[site.versioning.variants]]
name = "main"
label = "Current main"
source = "git_ref"
ref = "main"
url_segment = "main"

[build]
work_dir = ".sphinxpress"
sphinx_build = "sphinx-build"
fail_on_warning = false
keep_build_dir = false
parallel = "auto"

[build.env]
enabled = true
scope = "shared"
python = "python3"
path = ".sphinxpress/venv"
upgrade_pip = true
packages = [
  "sphinx>=7",
  "myst-parser",
  "sphinx-rtd-theme",
  "weasyprint>=67",
  "pydantic>=2",
  "tomli-w",
  "typer>=0.12",
  "PyYAML>=6",
  "rich",
  "beautifulsoup4",
  "phrasplit==0.3.3",
  "epub2text==0.2.7",
  "text2epub==0.1.4",
  "booktx==0.4.1",
  "sphinxpress>=0.1.1",
]

[book]
title = "buchwandler Tool Documentation"
author = "buchwandler"
language = "en"
project_order = ["booktx", "epub2text", "phrasplit", "text2epub", "sphinxpress"]

[pdf]
builder = "weasyprint"
output = "dist/buchwandler-tool-documentation.pdf"

[epub]
builder = "epub"
output = "dist/buchwandler-tool-documentation.epub"

[release]
tag_prefix = "v"
release_url_template = "{repo_url}/releases/tag/{tag}"

[[projects]]
name = "booktx"
title = "booktx"
docs_root = "../../odoo17/booktx/docs"
conf_dir = "../../odoo17/booktx/docs"
root_doc = "index"
repo_url = "https://github.com/buchwandler/booktx"
release_strategy = "git_tag"
site_variants = ["release", "main"]
version_refs = { main = "main" }

[[projects]]
name = "epub2text"
title = "epub2text"
docs_root = "../../odoo17/epub2text/docs"
conf_dir = "../../odoo17/epub2text/docs"
root_doc = "index"
repo_url = "https://github.com/buchwandler/epub2text"
release_strategy = "git_tag"
site_variants = ["release", "main"]
version_refs = { main = "main" }


[[projects]]
name = "phrasplit"
title = "phrasplit"
docs_root = "../../odoo17/phrasplit/docs"
conf_dir = "../../odoo17/phrasplit/docs"
root_doc = "index"
repo_url = "https://github.com/buchwandler/phrasplit"
release_strategy = "git_tag"
site_variants = ["release", "main"]
version_refs = { main = "main" }


[[projects]]
name = "text2epub"
title = "text2epub"
docs_root = "../../odoo17/text2epub/docs"
conf_dir = "../../odoo17/text2epub/docs"
root_doc = "index"
repo_url = "https://github.com/buchwandler/text2epub"
release_strategy = "git_tag"
site_variants = ["release", "main"]
version_refs = { main = "main" }


[[projects]]
name = "sphinxpress"
title = "sphinxpress"
docs_root = "../sphinxpress/docs"
conf_dir = "../sphinxpress/docs"
root_doc = "index"
repo_url = "https://github.com/buchwandler/sphinxpress"
release_strategy = "git_tag"
site_variants = ["release", "main"]
version_refs = { main = "main" }


